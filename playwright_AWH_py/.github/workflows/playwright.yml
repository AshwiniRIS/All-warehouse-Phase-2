name: Playwright CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt
        pip install behave
        python -m playwright install

    - name: Recreate state.json
      shell: powershell
      run: |
        python -c "
import base64, gzip
data = base64.b64decode('${{ secrets.STATE_JSON }}')
open('state.json','wb').write(gzip.decompress(data))
"

    - name: Run Tests
      run: |
        python -m behave

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: failure-screenshots
        path: screenshots/
        if-no-files-found: ignore